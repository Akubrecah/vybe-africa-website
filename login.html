<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Staff Login - Vybe Africa</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS with Stitch MCP Tokens -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#9f402d",
                        "primary-container": "#e2725b",
                        "on-primary": "#ffffff",
                        "secondary": "#4d6453",
                        "secondary-container": "#cde6d1",
                        "tertiary": "#705d00",
                        "background": "#fcf9f8",
                        "on-background": "#1c1b1b",
                        "surface": "#fcf9f8",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f6f3f2",
                        "on-surface": "#1c1b1b",
                        "on-surface-variant": "#56423e",
                        "outline": "#89726d",
                        "outline-variant": "#ddc0ba",
                        "inverse-surface": "#313030"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-background text-on-background font-body min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-surface-container-lowest p-8 rounded-xl border border-outline-variant/40 soft-shadow text-center">
        <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center text-primary mx-auto mb-4">
            <span class="material-symbols-outlined text-3xl">admin_panel_settings</span>
        </div>

        <h1 class="font-display text-2xl font-bold text-on-background">Staff Login</h1>
        <p class="text-on-surface-variant text-sm mt-1 mb-6">VYBE Africa Internal Staff Portal</p>

        <div class="bg-red-50 text-red-700 p-3 rounded-lg text-sm text-left mb-4 hidden border border-red-200" id="error-msg"></div>
        <div class="bg-green-50 text-green-700 p-3 rounded-lg text-sm text-left mb-4 hidden border border-green-200" id="success-msg"></div>

        <form id="login-form" onsubmit="event.preventDefault(); handleLogin();" class="space-y-4 text-left">
            <div>
                <label for="email" class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Email Address</label>
                <input type="email" id="email" required autofocus placeholder="Enter staff email" class="w-full p-3 border border-outline-variant rounded-lg bg-surface focus:border-primary">
            </div>

            <div>
                <label for="password" class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Password</label>
                <input type="password" id="password" required placeholder="Enter password" class="w-full p-3 border border-outline-variant rounded-lg bg-surface focus:border-primary">
            </div>

            <button type="button" class="w-full py-3 bg-primary text-on-primary font-bold text-sm uppercase tracking-wider rounded-lg hover:bg-primary-container transition-all shadow-sm flex items-center justify-center gap-2 mt-2" id="login-btn" onclick="handleLogin()">
                <span class="material-symbols-outlined text-lg">login</span> Sign In
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-outline-variant/30 text-xs text-on-surface-variant flex justify-between">
            <a href="member_login.html" class="hover:text-primary font-semibold flex items-center gap-1">
                <span class="material-symbols-outlined text-base">group</span> Member Login
            </a>
            <a href="homepage.html" class="hover:text-primary font-semibold flex items-center gap-1">
                <span class="material-symbols-outlined text-base">home</span> Home
            </a>
        </div>

        <div class="mt-4 text-left text-xs font-mono text-outline bg-surface-container-low p-2 rounded hidden" id="debug-info"></div>
    </div>

    <!-- Supabase for database & bcrypt for password -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const supabaseUrl = 'https://mdjokagpejujfjfobdcs.supabase.co';
            const supabaseKey = 'sb_publishable_Y9Wv-aZdMFVv55-CYgj2AA_6l3Iz31G';
            
            let supabase;
            try {
                supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            } catch (e) {
                console.error('Supabase init failed:', e);
            }

            const bcrypt = window.dcodeIO ? window.dcodeIO.bcrypt : window.bcrypt;
            const loginBtn = document.getElementById('login-btn');
            
            if (loginBtn) {
                loginBtn.addEventListener('click', handleLogin);
            }

            function showError(msg) {
                const el = document.getElementById('error-msg');
                el.textContent = msg;
                el.classList.remove('hidden');
                document.getElementById('success-msg').classList.add('hidden');
            }

            function showSuccess(msg) {
                const el = document.getElementById('success-msg');
                el.innerHTML = msg;
                el.classList.remove('hidden');
                document.getElementById('error-msg').classList.add('hidden');
            }

            function debug(msg) {
                console.log('[LOGIN]', msg);
                const el = document.getElementById('debug-info');
                el.classList.remove('hidden');
                el.innerHTML += msg + '<br>';
            }

            async function handleLogin(e) {
                if(e) e.preventDefault();
                
                const submitBtn = document.getElementById('login-btn');
                document.getElementById('error-msg').classList.add('hidden');
                document.getElementById('success-msg').classList.add('hidden');
                document.getElementById('debug-info').innerHTML = '';

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    showError('Please fill in all fields');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-lg">sync</span> Checking...';

                try {
                    debug('Connecting to database...');
                    if (!supabase) throw new Error('Supabase client not initialized');

                    const { data: users, error } = await supabase
                        .from('users')
                        .select('*')
                        .eq('email', email);

                    if (error) throw error;

                    if (!users || users.length === 0) {
                        showError('Account not found. Please check email.');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<span class="material-symbols-outlined text-lg">login</span> Sign In';
                        return;
                    }

                    const user = users[0];
                    debug('User found: ' + user.role);

                    let passwordMatch = false;
                    if (bcrypt) {
                        try {
                            passwordMatch = bcrypt.compareSync(password, user.password);
                        } catch (e) {}
                    }

                    if (!passwordMatch && password === user.password) {
                        passwordMatch = true;
                    }

                    if (!passwordMatch) {
                        showError('Incorrect password');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<span class="material-symbols-outlined text-lg">login</span> Sign In';
                        return;
                    }

                    debug('Password verified!');
                    
                    localStorage.setItem('user_id', user.id);
                    localStorage.setItem('email', user.email);
                    localStorage.setItem('role', user.role || 'staff');
                    localStorage.setItem('designation', user.designation || '');

                    const role = (user.role || '').toLowerCase();
                    const designation = (user.designation || '').toLowerCase();
                    let redirectUrl = 'staff.html';

                    if (role === 'superadmin' || role === 'admin' || designation.includes('executive')) {
                        redirectUrl = 'admin_dashboard.html';
                    } else if (role === 'hr' || designation.includes('hr')) {
                        redirectUrl = 'hr_dashboard.html';
                    } else if (role === 'programs' || designation.includes('program')) {
                        redirectUrl = 'programs_dashboard.html';
                    }

                    debug('Routing to: ' + redirectUrl);
                    
                    const btnHtml = `
                        <div class="p-3 bg-green-100 text-green-800 rounded-lg border border-green-300 text-center space-y-2">
                            <p class="font-bold">✅ LOGIN SUCCESSFUL</p>
                            <a href="${redirectUrl}" class="inline-block w-full bg-secondary text-on-secondary py-2 rounded font-bold text-xs uppercase">
                                Go to Dashboard →
                            </a>
                        </div>
                    `;
                    
                    showSuccess(btnHtml);
                    submitBtn.style.display = 'none';

                    window.location.href = redirectUrl;

                } catch (err) {
                    console.error(err);
                    showError('System Error: ' + err.message);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span class="material-symbols-outlined text-lg">login</span> Sign In';
                }
            }
        });
    </script>
</body>
</html>
