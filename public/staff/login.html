    <style>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.backgroundColor = '#9f402d';
            errorDiv.style.color = '#fff';
            errorDiv.style.padding = '15px';
            errorDiv.style.zIndex = '99999';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.style.fontSize = '12px';
            errorDiv.style.whiteSpace = 'pre-wrap';
            errorDiv.innerHTML = '<strong>[GLOBAL ERROR]</strong> ' + message + ' at ' + source + ':' + lineno + ':' + colno + '\n' + (error ? error.stack : '');
            document.body.appendChild(errorDiv);
            return false;
        };
    </script>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop selection:bg-primary-fixed selection:text-on-primary-container">
<!-- Centered Card Container -->
<main class="w-full max-w-[480px] my-auto">
    <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-2xl p-6 md:p-10 shadow-xl flex flex-col">
        <!-- Brand Logo -->
        <a href="homepage.html" class="flex items-center justify-center gap-3 mb-6 text-primary hover:opacity-80 transition-opacity">
            <img src="assets/images/logo.png" alt="VYBE Africa" class="h-10 w-auto object-contain" onerror="this.style.display='none'">
            <span class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Vybe Africa</span>
        </a>

        <!-- Form Header -->
        <div class="text-center mb-8 space-y-1.5">
            <h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">
                Staff Portal
            </h1>
            <p class="font-body-md text-body-md text-on-surface-variant">
                Enter your credentials to access the workspace.
            </p>
        </div>

        <!-- Alert Messages -->
        <div class="bg-red-50 text-red-700 p-3.5 rounded-xl text-sm text-left mb-4 hidden border border-red-200" id="error-msg"></div>
        <div class="bg-green-50 text-green-700 p-3.5 rounded-xl text-sm text-left mb-4 hidden border border-green-200" id="success-msg"></div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-5" onsubmit="event.preventDefault(); handleLogin();">
            <!-- Email Field -->
            <div class="space-y-1.5 text-left">
                <label class="font-label-sm text-label-sm text-on-surface block" for="email">
                    Email Address
                </label>
                <div class="relative">
                    <input class="w-full bg-surface border border-outline/20 rounded-xl px-4 py-3.5 font-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all" id="email" name="email" placeholder="name@vybeafrica.org" required type="email" autofocus/>
                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">mail</span>
                </div>
            </div>

            <!-- Password Field -->
            <div class="space-y-1.5 text-left">
                <label class="font-label-sm text-label-sm text-on-surface block" for="password">
                    Password
                </label>
                <div class="relative">
                    <input class="w-full bg-surface border border-outline/20 rounded-xl px-4 py-3.5 font-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all" id="password" name="password" placeholder="••••••••" required type="password"/>
                    <button aria-label="Toggle password visibility" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" onclick="togglePassword()" type="button">
                        <span class="material-symbols-outlined" id="visibility-icon">visibility</span>
                    </button>
                </div>
            </div>

            <!-- Options Row -->
            <div class="flex items-center justify-between pt-1">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <div class="relative flex items-center justify-center">
                        <input class="peer appearance-none w-5 h-5 border border-outline/30 rounded-DEFAULT bg-surface checked:bg-primary checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all cursor-pointer" type="checkbox"/>
                        <span class="material-symbols-outlined absolute text-on-primary text-[16px] opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" style="font-variation-settings: 'wght' 700;">check</span>
                    </div>
                    <span class="font-body-md text-[14px] text-on-surface-variant group-hover:text-on-surface transition-colors">
                        Remember for 30 days
                    </span>
                </label>
                <a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors underline-offset-4 hover:underline" href="forgot-password.html">
                    Forgot Password?
                </a>
            </div>

            <!-- Submit Button -->
            <div class="pt-2">
                <button id="login-btn" class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-sm text-label-sm py-4 rounded-xl transition-colors shadow-sm focus:outline-none focus:ring-4 focus:ring-primary/20 flex items-center justify-center gap-2" type="submit">
                    <span>Sign In</span>
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                </button>
            </div>
        </form>

            <!-- Quick Demo Login Panel -->
            <div class="mt-6 pt-4 border-t border-outline/10">

                <div class="grid grid-cols-2 gap-2 text-xs">
                    <button type="button" onclick="quickDemoLogin('sharon@vybeafrica.org', 'superadmin', 'Sharon Chepkite', 'Executive Director', 'admin_dashboard.html')" class="p-2.5 rounded-lg border border-primary/20 bg-primary/5 hover:bg-primary/10 font-semibold text-primary text-left transition-colors flex items-center gap-1.5">
                        <span>👑</span> Sharon (Exec Dir)
                    </button>
                    <button type="button" onclick="quickDemoLogin('moses@vybeafrica.org', 'programs', 'Moses Kibet', 'Programs Manager', 'programs_dashboard.html')" class="p-2.5 rounded-lg border border-secondary/20 bg-secondary/5 hover:bg-secondary/10 font-semibold text-secondary text-left transition-colors flex items-center gap-1.5">
                        <span>📋</span> Moses (Programs)
                    </button>
                    <button type="button" onclick="quickDemoLogin('farex@vybeafrica.org', 'hr', 'Farex Nandwa', 'HR Director', 'hr_dashboard.html')" class="p-2.5 rounded-lg border border-tertiary/20 bg-tertiary/5 hover:bg-tertiary/10 font-semibold text-tertiary text-left transition-colors flex items-center gap-1.5">
                        <span>👥</span> Farex (HR)
                    </button>
                    <button type="button" onclick="quickDemoLogin('marcellina@vybeafrica.org', 'communications', 'Marcellina Cherubia', 'Communication Officer', 'communications_dashboard.html')" class="p-2.5 rounded-lg border border-outline/20 bg-surface-container-high hover:bg-surface-variant font-semibold text-on-surface text-left transition-colors flex items-center gap-1.5">
                        <span>📣</span> Marcellina (Comms)
                    </button>
                    <button type="button" onclick="quickDemoLogin('tony@vybeafrica.org', 'me', 'Tony Barasa', 'M&E Lead', 'me_dashboard.html')" class="p-2.5 rounded-lg border border-primary/20 bg-primary/5 hover:bg-primary/10 font-semibold text-primary text-left transition-colors flex items-center gap-1.5">
                        <span>📊</span> Tony (M&E Lead)
                    </button>
                    <button type="button" onclick="quickDemoLogin('joe@vybeafrica.org', 'finance', 'Joe Junior', 'Finance Manager', 'finance_dashboard.html')" class="p-2.5 rounded-lg border border-secondary/20 bg-secondary/5 hover:bg-secondary/10 font-semibold text-secondary text-left transition-colors flex items-center gap-1.5">
                        <span>💰</span> Joe (Finance)
                    </button>
                </div>
            </div>

        <div class="mt-6 pt-4 text-center border-t border-outline/10">
            <a href="homepage.html" class="inline-flex items-center gap-1.5 font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-lg">arrow_back</span> Back to Ecosystem Home
            </a>
        </div>

        <!-- Security Note -->
        <div class="mt-6 flex items-center justify-center gap-2 text-on-surface-variant/80 border-t border-outline/10 pt-4">
            <span class="material-symbols-outlined text-[18px]">gpp_good</span>
            <span class="font-body-md text-[13px]">Authorized access only. All activities are logged.</span>
        </div>
    </div>
</main>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseUrl = 'https://uwfkqitmopqcbvwhkcgg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3ZmtxaXRtb3BxY2J2d2hrY2dnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTM2OTksImV4cCI6MjA5ODg4OTY5OX0.clHwO4AOcCB1yFbxGybydSUAlfR3uCaccnqt_mew3H8';

    let supabaseClient;
    try {
        supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
        });
    } catch (e) {
        console.error('Supabase init failed in login:', e);
    }

    function getDashboardForUser() {
        const role = (localStorage.getItem('role') || '').toLowerCase();
        const designation = (localStorage.getItem('designation') || '').toLowerCase();

        if (role === 'superadmin' || role === 'admin' || designation.includes('executive') || designation.includes('director')) {
            return 'admin_dashboard.html';
        }
        if (role === 'hr' || designation.includes('hr')) {
            return 'hr_dashboard.html';
        }
        if (role === 'programs' || designation.includes('program')) {
            return 'programs_dashboard.html';
        }
        if (role === 'communications' || designation.includes('communication') || designation.includes('media')) {
            return 'communications_dashboard.html';
        }
        if (role === 'me' || designation.includes('m&e') || designation.includes('evaluation') || designation.includes('monitoring')) {
            return 'me_dashboard.html';
        }
        if (role === 'finance' || designation.includes('finance') || designation.includes('account')) {
            return 'finance_dashboard.html';
        }
        return 'staff.html';
    }

    // Auto-redirect if staff is already logged in
    if (typeof window !== 'undefined' && localStorage.getItem('user_id')) {
        window.location.href = getDashboardForUser();
    }

    async function quickDemoLogin(email, role, name, designation, targetDashboard) {
        document.getElementById('email').value = email;
        document.getElementById('password').value = 'Vybe2024';
        
        const el = document.getElementById('success-msg');
        if (el) {
            el.innerHTML = `<div class="p-3 bg-green-100 text-green-800 rounded-xl font-bold text-center">Authenticating session...</div>`;
            el.classList.remove('hidden');
        }

        // Exact email-to-id mapping from public.users database records
        const demoIds = {
            'sharon@vybeafrica.org': '64b4414e-e555-48fa-8885-6502e16c3513',
            'moses@vybeafrica.org': 'd9ed018b-2f3c-4986-9857-52c4ba98247a',
            'marcellina@vybeafrica.org': 'f5fbddcf-045b-4875-8f4e-2b81a40fc418',
            'farex@vybeafrica.org': '64b64358-92e2-4ff5-8f67-7b664bc88d19',
            'tony@vybeafrica.org': '806e8e48-a3f2-4624-bda3-19f08b383511',
            'joe@vybeafrica.org': '2f1d7dfa-c62d-4aaa-af03-15373fed3db7',
            'poweldayck@gmail.com': '377c6ec2-bbb6-48a2-8365-3a58a50ba36b'
        };

        const activeId = demoIds[email] || 'demo-temp-id';

        if (supabaseClient) {
            const loginPromise = supabaseClient.auth.signInWithPassword({
                email: email,
                password: 'Vybe2024'
            });

            // Create a 3.5 second timeout promise
            const timeoutPromise = new Promise((_, reject) => 
                setTimeout(() => reject(new Error('Connection timeout.')), 3500)
            );

            try {
                // Race the native sign-in against the timeout
                const { data, error } = await Promise.race([loginPromise, timeoutPromise]);
                if (error) throw error;

                const user = data.user;

                // Query profile metadata from public.users to populate local cache
                const { data: profile, error: profileError } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (profileError || !profile) {
                    throw new Error('Profile synchronization failed.');
                }

                // Cache metadata properties to local storage synchronously
                localStorage.setItem('user_id', profile.id);
                localStorage.setItem('email', profile.email);
                localStorage.setItem('name', profile.name || 'Staff Member');
                localStorage.setItem('role', profile.role || 'staff');
                localStorage.setItem('designation', profile.designation || '');
                localStorage.setItem('avatar_url', profile.avatar_url || '');
                localStorage.setItem('bio', profile.bio || '');

            } catch (e) {
                console.warn('Demo login handshake failed or timed out:', e.message);
                // On failure or timeout, populate local cache with clicked params to permit offline mode entry
                localStorage.setItem('user_id', activeId);
                localStorage.setItem('email', email);
                localStorage.setItem('name', name);
                localStorage.setItem('role', role);
                localStorage.setItem('designation', designation);
                localStorage.setItem('avatar_url', '');
                localStorage.setItem('bio', '');
            }
        } else {
            // No client, write cached values directly
            localStorage.setItem('user_id', activeId);
            localStorage.setItem('email', email);
            localStorage.setItem('name', name);
            localStorage.setItem('role', role);
            localStorage.setItem('designation', designation);
            localStorage.setItem('avatar_url', '');
            localStorage.setItem('bio', '');
        }

        window.location.href = targetDashboard;
    }

    function togglePassword() {
        const pwdInput = document.getElementById('password');
        const icon = document.getElementById('visibility-icon');
        if (pwdInput.type === 'password') {
            pwdInput.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            pwdInput.type = 'password';
            icon.textContent = 'visibility';
        }
    }

    // Attach to global window scope explicitly for inline HTML onclick attributes
    window.quickDemoLogin = quickDemoLogin;
    window.togglePassword = togglePassword;

    document.addEventListener('DOMContentLoaded', function() {
        function showError(msg) {
            const el = document.getElementById('error-msg');
            if (el) {
                el.textContent = msg;
                el.classList.remove('hidden');
            }
            const successEl = document.getElementById('success-msg');
            if (successEl) successEl.classList.add('hidden');
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            if (el) {
                el.innerHTML = msg;
                el.classList.remove('hidden');
            }
            const errorEl = document.getElementById('error-msg');
            if (errorEl) errorEl.classList.add('hidden');
        }

        // Check for any authentication error reasons passed from the guard redirect
        const authErrorReason = sessionStorage.getItem('auth_error_reason');
        if (authErrorReason) {
            sessionStorage.removeItem('auth_error_reason');
            showError(authErrorReason);
        }

        window.handleLogin = async function(e) {
            if(e) e.preventDefault();
            
            const submitBtn = document.getElementById('login-btn');
            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('success-msg').classList.add('hidden');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Signing In...</span><span class="material-symbols-outlined animate-spin text-[20px]">sync</span>';

            try {
                if (!supabaseClient) throw new Error('Supabase client not initialized');

                // Sign in with native Supabase Auth
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                const user = data.user;

                // Query profile metadata from public.users to perform redirection
                const { data: profile, error: profileError } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (profileError || !profile) {
                    throw new Error('User profile record not found. Please contact an admin.');
                }

                // Cache metadata properties to local storage
                localStorage.setItem('user_id', profile.id);
                localStorage.setItem('email', profile.email);
                localStorage.setItem('name', profile.name || 'Staff Member');
                localStorage.setItem('role', profile.role || 'staff');
                localStorage.setItem('designation', profile.designation || '');
                localStorage.setItem('avatar_url', profile.avatar_url || '');

                const role = (profile.role || '').toLowerCase();
                const designation = (profile.designation || '').toLowerCase();
                let redirectUrl = 'staff.html';

                if (role === 'superadmin' || role === 'admin' || designation.includes('executive')) {
                    redirectUrl = 'admin_dashboard.html';
                } else if (role === 'hr' || designation.includes('hr')) {
                    redirectUrl = 'hr_dashboard.html';
                } else if (role === 'programs' || designation.includes('program')) {
                    redirectUrl = 'programs_dashboard.html';
                } else if (role === 'communications' || designation.includes('communication') || designation.includes('media')) {
                    redirectUrl = 'communications_dashboard.html';
                } else if (role === 'me' || designation.includes('m&e') || designation.includes('evaluation') || designation.includes('monitoring')) {
                    redirectUrl = 'me_dashboard.html';
                } else if (role === 'finance' || designation.includes('finance') || designation.includes('accounts') || designation.includes('treasury')) {
                    redirectUrl = 'finance_dashboard.html';
                }

                const btnHtml = `
                    <div class="p-3 bg-green-100 text-green-800 rounded-xl border border-green-300 text-center space-y-2">
                        <p class="font-bold">✅ LOGIN SUCCESSFUL</p>
                        <a href="${redirectUrl}" class="inline-block w-full bg-secondary text-on-secondary py-2.5 rounded-lg font-bold text-xs uppercase tracking-wider">
                            Go to Dashboard →
                        </a>
                    </div>
                `;
                
                showSuccess(btnHtml);
                submitBtn.style.display = 'none';

                window.location.href = redirectUrl;

            } catch (err) {
                console.error('Login error:', err);
                showError('Authentication Failed: ' + err.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Sign In</span><span class="material-symbols-outlined text-[20px]">arrow_forward</span>';
            }
        };
    });
</script>
</body>
</html>
